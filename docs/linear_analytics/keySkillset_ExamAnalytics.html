<style>
:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface2: #f1f3f8;
  --border: #e5e9f2;
  --text: #0f1623;
  --text2: #4a5568;
  --text3: #8892a4;
  --accent: #4f6ef7;
  --accent2: #7c3aed;
  --green: #10b981;
  --orange: #f59e0b;
  --red: #ef4444;
  --neet: #0ea5e9;
  --jee: #8b5cf6;
  --clat: #f97316;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 8px 32px rgba(0,0,0,0.06);
}
.dark {
  --bg: #0d1117;
  --surface: #161b27;
  --surface2: #1e2535;
  --border: #2a3348;
  --text: #e8edf5;
  --text2: #94a3b8;
  --text3: #4a5568;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  font-size: 14px;
  line-height: 1.5;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
@keyframes countUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
@keyframes drawLine { to { stroke-dashoffset: 0; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

.fade-up { animation: fadeUp 0.5s ease both; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation: pulse 2s ease-in-out infinite; display:inline-block; }

/* Card base */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  box-shadow: var(--card-shadow);
  transition: box-shadow 0.2s, transform 0.2s;
}
.card:hover { box-shadow: var(--card-shadow-hover); }

/* Stat pill */
.stat-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 500;
}
.pill-green { background: #d1fae5; color: #065f46; }
.pill-red { background: #fee2e2; color: #991b1b; }
.pill-orange { background: #fef3c7; color: #92400e; }
.pill-blue { background: #dbeafe; color: #1e40af; }
.dark .pill-green { background: #064e3b; color: #6ee7b7; }
.dark .pill-red { background: #7f1d1d; color: #fca5a5; }
.dark .pill-orange { background: #78350f; color: #fcd34d; }
.dark .pill-blue { background: #1e3a8a; color: #93c5fd; }

/* Section label */
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 16px;
}

/* Tab styles */
.exam-tab {
  padding: 8px 20px; border-radius: 10px; font-weight: 600; font-size: 14px;
  cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
  background: transparent; color: var(--text2);
}
.exam-tab.active-neet { background: #e0f2fe; color: #0369a1; border-color: #0ea5e9; }
.exam-tab.active-jee { background: #ede9fe; color: #6d28d9; border-color: #8b5cf6; }
.exam-tab.active-clat { background: #fff7ed; color: #c2410c; border-color: #f97316; }
.dark .exam-tab.active-neet { background: #0c2d3e; color: #38bdf8; border-color: #0ea5e9; }
.dark .exam-tab.active-jee { background: #2d1b69; color: #c4b5fd; border-color: #8b5cf6; }
.dark .exam-tab.active-clat { background: #3d1a00; color: #fb923c; border-color: #f97316; }
.exam-tab:hover:not(.active-neet):not(.active-jee):not(.active-clat) { background: var(--surface2); color: var(--text); }

/* Progress bar */
.progress-bar { height: 6px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.4,0,.2,1); }

/* Confidence band for AIR */
.confidence-band {
  position: relative; height: 48px; border-radius: 12px;
  background: linear-gradient(90deg, #fef9c3, #fef3c7, #fed7aa, #fca5a5);
  overflow: hidden;
}
.confidence-needle {
  position: absolute; top: 0; width: 3px; height: 100%;
  background: var(--text); border-radius: 2px;
  transition: left 1s cubic-bezier(.4,0,.2,1);
}

/* SVG chart helpers */
.chart-line { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.chart-area { opacity: 0.12; }
.grid-line { stroke: var(--border); stroke-width: 1; }
.axis-label { font-size: 10px; fill: var(--text3); font-family: 'Inter', sans-serif; }

/* Heatmap cell */
.heatmap-cell {
  border-radius: 6px; cursor: pointer; transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500;
}
.heatmap-cell:hover { transform: scale(1.1); }
.heat-0 { background: var(--surface2); color: var(--text3); }
.heat-1 { background: #fef9c3; color: #854d0e; }
.heat-2 { background: #fde68a; color: #92400e; }
.heat-3 { background: #fca5a5; color: #7f1d1d; }
.heat-4 { background: #f87171; color: #ffffff; }
.heat-5 { background: #dc2626; color: #ffffff; }
.heat-good { background: #bbf7d0; color: #065f46; }
.heat-great { background: #34d399; color: #ffffff; }
.dark .heat-0 { background: #1e2535; color: #4a5568; }
.dark .heat-1 { background: #3d2e00; color: #fcd34d; }
.dark .heat-2 { background: #5c3a00; color: #fbbf24; }
.dark .heat-3 { background: #5c1a1a; color: #fca5a5; }
.dark .heat-4 { background: #7f1d1d; color: #fecaca; }
.dark .heat-5 { background: #991b1b; color: #ffffff; }
.dark .heat-good { background: #064e3b; color: #6ee7b7; }
.dark .heat-great { background: #065f46; color: #34d399; }

/* Quadrant */
.quadrant-cell {
  border-radius: 12px; padding: 14px; position: relative; overflow: hidden;
}

/* Rank card */
.rank-card-gradient {
  background: linear-gradient(135deg, #1e3a8a 0%, #4f6ef7 40%, #7c3aed 100%);
}

/* Radar chart placeholder */
.radar-wrap { position: relative; }

/* Tooltip */
.tooltip {
  position: absolute; background: var(--text); color: var(--surface);
  padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 500;
  pointer-events: none; z-index: 100; white-space: nowrap;
  transform: translate(-50%, -110%);
}

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
}

/* Navbar */
.navbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--surface); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}

/* Recovery track */
.recovery-track { position: relative; height: 8px; border-radius: 99px; background: var(--surface2); }
.recovery-fill { height: 100%; border-radius: 99px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }
.recovery-marker {
  position: absolute; top: 50%; width: 16px; height: 16px;
  border-radius: 50%; transform: translate(-50%, -50%);
  border: 2px solid var(--surface); box-shadow: 0 0 0 2px currentColor;
}

input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 99px; background: var(--surface2); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; }

/* Modal overlay */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-card {
  background: var(--surface); border-radius: 20px; padding: 32px;
  max-width: 420px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,0.2);
}

/* Onboarding step */

  cursor: pointer; transition: all 0.15s; color: var(--text2);

.onboard-option:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }
.onboard-option.selected { border-color: var(--accent); background: #eef2ff; color: var(--accent); }
.dark .onboard-option.selected { background: #1e2a5e; }

button.primary-btn {
  background: var(--accent); color: white; border: none; border-radius: 10px;
  padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: opacity 0.15s; font-family: inherit;

button.primary-btn:hover { opacity: 0.9; }
button.ghost-btn {
  background: transparent; color: var(--text2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
button.ghost-btn:hover { background: var(--surface2); color: var(--text); }

  const d = new Date(dateStr);
  const now = new Date();
  return Math.max(0, Math.ceil((d - now) / 86400000));
}

function getExamColor(exam) {
  return exam === 'neet' ? '#0ea5e9' : exam === 'jee' ? '#8b5cf6' : '#f97316';
}

function getExamLabel(exam) {
  return exam === 'neet' ? 'NEET UG' : exam === 'jee' ? 'JEE Mains' : 'CLAT UG';
}

function getExamMax(exam) {
  return exam === 'neet' ? 720 : exam === 'jee' ? 300 : 120;
}

function formatAIR(n) {
  if (n >= 100000) return (n/100000).toFixed(1) + 'L';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ─── SVG CHARTS ────────────────────────────────────────────────────────────

function sparklinePath(values, w, h, pad=8) {
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => ({
    x: pad + (i / (values.length - 1)) * (w - pad * 2),
    y: h - pad - ((v - min) / range) * (h - pad * 2)
  }));
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length; i++) {
    const cx = (pts[i-1].x + pts[i].x) / 2;
    d += ` C ${cx} ${pts[i-1].y} ${cx} ${pts[i].y} ${pts[i].x} ${pts[i].y}`;
  }
  return { path: d, pts };
}

function areaPath(linePath, pts, w, h) {
  return linePath + ` L ${pts[pts.length-1].x} ${h} L ${pts[0].x} ${h} Z`;
}

function ScoreTrajectory() {
  const ex = state.exam;
  const d = DATA[ex];
  const color = getExamColor(ex);
  const maxScore = getExamMax(ex);
  const scores = d.mocks.map(m => m.score);
  const target = state.targetInput[ex];
  const prevScore = state.recoveryInput[ex];

  const W = 560, H = 160, PAD = 40;
  const { path, pts } = sparklinePath(scores, W, H);
  const area = areaPath(path, pts, W, H);

  // Target line y
  const minS = Math.min(...scores, prevScore) - 10;
  const maxS = Math.max(...scores, target) + 20;
  const range = maxS - minS;
  const targetY = H - PAD - ((target - minS) / range) * (H - PAD * 2 + 8);
  const prevY = H - PAD - ((prevScore - minS) / range) * (H - PAD * 2 + 8);

  // Recompute with correct scale
  const pts2 = d.mocks.map((m, i) => ({
    x: PAD + (i / (d.mocks.length - 1)) * (W - PAD * 2),
    y: H - PAD - ((m.score - minS) / range) * (H - PAD * 2 + 8)
  }));
  let linePath = `M ${pts2[0].x} ${pts2[0].y}`;
  for (let i = 1; i < pts2.length; i++) {
    const cx = (pts2[i-1].x + pts2[i].x) / 2;
    linePath += ` C ${cx} ${pts2[i-1].y} ${cx} ${pts2[i].y} ${pts2[i].x} ${pts2[i].y}`;
  }
  const areaPath2 = linePath + ` L ${pts2[pts2.length-1].x} ${H} L ${pts2[0].x} ${H} Z`;

  return `
  <div class="card fade-up" style="animation-delay:0.2s;margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="section-label" style="margin-bottom:4px">📈 Score Trajectory</div>
        <div style="font-size:13px;color:var(--text2)">All ${d.mocks.length} mocks · ${getExamLabel(ex)}</div>
      </div>
      <div style="display:flex;gap:16px;font-size:11px;color:var(--text3)">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:2px;background:${color};display:inline-block;border-radius:2px"></span>Your scores</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:2px;background:#10b981;display:inline-block;border-radius:2px;border-top:2px dashed #10b981;border-bottom:none"></span>Target</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:2px;background:#f59e0b;display:inline-block;border-radius:2px;border-top:2px dashed #f59e0b;border-bottom:none"></span>Previous real</span>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
      <!-- Grid lines -->
      ${[0,1,2,3].map(i => {
        const y = PAD + (i / 3) * (H - PAD * 2);
        const val = Math.round(maxS - (i / 3) * range);
        return `<line x1="${PAD}" y1="${y}" x2="${W-PAD/2}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
                <text x="${PAD-6}" y="${y+4}" text-anchor="end" class="axis-label">${val}</text>`;
      }).join('')}

      <!-- Target line -->
      <line x1="${PAD}" y1="${targetY}" x2="${W-PAD/2}" y2="${targetY}" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="${W-PAD/2+4}" y="${targetY+4}" class="axis-label" fill="#10b981">Target</text>

      <!-- Previous score line -->
      <line x1="${PAD}" y1="${prevY}" x2="${W-PAD/2}" y2="${prevY}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="${W-PAD/2+4}" y="${prevY+4}" class="axis-label" fill="#f59e0b">Prev</text>

      <!-- Area fill -->
      <path d="${areaPath2}" fill="${color}" opacity="0.08"/>

      <!-- Main line -->
      <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Data points -->
      ${pts2.map((pt, i) => `
        <circle cx="${pt.x}" cy="${pt.y}" r="5" fill="${color}" stroke="var(--surface)" stroke-width="2"/>
        <text x="${pt.x}" y="${pt.y - 10}" text-anchor="middle" class="axis-label" fill="${color}" font-weight="600">${d.mocks[i].score}</text>
      `).join('')}

      <!-- X axis labels -->
      ${d.mocks.map((m, i) => `
        <text x="${pts2[i].x}" y="${H - 2}" text-anchor="middle" class="axis-label">${m.label}</text>
      `).join('')}
    </svg>
  </div>`;
}

function ConceptMastery() {
  const ex = state.exam;
  const d = DATA[ex];

  const allConcepts = sections.flatMap(s =>
    s.concepts.map(c => ({...c, section: s.name, sectionColor: s.color}))

  function heatClass(acc) {
    if (acc >= 85) return 'heat-great';

    if (acc >= 45) return 'heat-3';
    if (acc >= 35) return 'heat-4';

  return `

              <div style="display:flex;align-items:center;gap:8px">

function SectionPerformance() {
  const ex = state.exam;
  const d = DATA[ex];
  const color = getExamColor(ex);
  const sections = Object.values(d.sections);

  // CLAT radar
  if (ex === 'clat') {
    const W = 220, CX = 110, CY = 110, R = 80;
    const n = sections.length;
    const pts = sections.map((s, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const pct = s.avgScore / s.maxMarks;
      return {
        x: CX + R * pct * Math.cos(angle),
        y: CY + R * pct * Math.sin(angle),
        lx: CX + (R + 24) * Math.cos(angle),
        ly: CY + (R + 24) * Math.sin(angle),
        angle
      };
    });
    const polyPoints = pts.map(p => `${p.x},${p.y}`).join(' ');
    const gridPts = (scale) => sections.map((_, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      return `${CX + R * scale * Math.cos(angle)},${CY + R * scale * Math.sin(angle)}`;
    }).join(' ');

    return `
    <div class="fade-up" style="animation-delay:0.32s;margin-bottom:16px">
      <div class="section-label">📊 CLAT 5-Section Radar</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center">
        <svg viewBox="0 0 ${W} ${W}" width="240">
          ${[0.25,0.5,0.75,1].map(s => `<polygon points="${gridPts(s)}" fill="none" stroke="var(--border)" stroke-width="1"/>`).join('')}
          ${sections.map((_, i) => {
            const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
            return `<line x1="${CX}" y1="${CY}" x2="${CX + R * Math.cos(angle)}" y2="${CY + R * Math.sin(angle)}" stroke="var(--border)" stroke-width="1"/>`;
          }).join('')}
          <polygon points="${polyPoints}" fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="2"/>
          ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}"/>`).join('')}
          ${pts.map((p, i) => `<text x="${p.lx}" y="${p.ly}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="var(--text2)" font-family="Inter,sans-serif">${sections[i].name.split(' ')[0]}</text>`).join('')}
        </svg>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${sections.map(s => `
            <div style="padding:12px;background:var(--surface2);border-radius:12px;border-left:3px solid ${s.color}">
              <div style="font-size:11px;font-weight:700;color:${s.color};margin-bottom:4px">${s.name}</div>
              <div style="font-size:20px;font-weight:800;color:var(--text)">${s.avgScore}<span style="font-size:12px;color:var(--text3)">/${s.maxMarks}</span></div>
              <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
                <span class="stat-pill pill-blue">${s.accuracy}% acc</span>
                <span class="stat-pill pill-green">${s.trend}</span>
              </div>
              <div style="margin-top:8px;font-size:11px;color:var(--text3)">Avg time: ${s.avgTime}s/q</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
  }

  return `
  <div class="fade-up" style="animation-delay:0.32s;margin-bottom:16px">
    <div class="section-label">📊 Section Performance</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      ${sections.map(s => {
        const mockScores = ex === 'neet'
          ? DATA.neet.mocks.map(m => m[s.name.toLowerCase()] || 0)
          : ex === 'jee'
          ? DATA.jee.mocks.map(m => m[s.name.toLowerCase() === 'mathematics' ? 'maths' : s.name.toLowerCase()] || 0)
          : [];
        const W2 = 160, H2 = 50;

        return `
        <div class="card" style="padding:18px;border-top:3px solid ${s.color}">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px">

  const color = getExamColor(ex);
  const sections = Object.values(d.sections);

  const allConcepts = sections.flatMap(s =>
    s.concepts.map(c => ({...c, section: s.name, sectionColor: s.color}))
  ).sort((a,b) => b.lost - a.lost).slice(0, 3);

  const totalLost = allConcepts.reduce((s,c) => s + c.lost, 0);

  return `
  <div class="card fade-up" style="animation-delay:0.4s;margin-bottom:16px;border-top:3px solid ${color}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="section-label" style="margin-bottom:4px">🚀 Top Leverage Actions</div>
        <div style="font-size:13px;color:var(--text2)">Fix these 3 concepts to recover <strong style="color:${color}">+${totalLost} marks</strong></div>
      </div>
      <div style="padding:8px 16px;background:${color}15;border-radius:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:${color}">+${Math.round(totalLost * 0.7)}</div>
        <div style="font-size:11px;color:var(--text3)">realistic gain</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      ${allConcepts.map((c, i) => `
        <div style="padding:16px;background:var(--surface2);border-radius:14px;border:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:${c.sectionColor};color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">${i+1}</div>
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--text)">${c.name}</div>
              <div style="font-size:11px;color:${c.sectionColor}">${c.section}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
            <div style="padding:6px;background:var(--surface);border-radius:8px;text-align:center">
              <div style="font-size:16px;font-weight:700;color:#ef4444">−${c.lost}</div>
              <div style="font-size:10px;color:var(--text3)">marks lost</div>
            </div>
            <div style="padding:6px;background:var(--surface);border-radius:8px;text-align:center">
              <div style="font-size:16px;font-weight:700;color:var(--text)">${c.accuracy}%</div>
              <div style="font-size:10px;color:var(--text3)">accuracy</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text3);background:var(--surface);border-radius:8px;padding:6px 8px">
            ${c.timeRatio > 1.2 ? '🧩 Concept gap — needs targeted revision' :
              c.timeRatio < 0.8 ? '⚡ Likely careless — slow down & verify' :
              '📖 Mixed pattern — revise + practice under time'}
          </div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:12px;padding:12px 16px;background:${color}08;border-radius:12px;border:1px solid ${color}20;font-size:12px;color:var(--text2);line-height:1.6">
      📅 <strong>This week's focus:</strong> Spend 70% of revision time on the #1 concept above.
      At current improvement rate of <strong>${(d.mocks[d.mocks.length-1].score - d.mocks[0].score) / d.mocks.length}pts/mock</strong>,
      fixing this alone could push your AIR by <strong style="color:${color}">~${Math.round(d.airData.current * 0.05)} ranks</strong>.
    </div>
  </div>`;
}

function PeerComparison() {
  const ex = state.exam;
  const d = DATA[ex];
  const color = getExamColor(ex);
  const pct = d.peerPercentile;
  const latest = d.mocks[d.mocks.length - 1];

  return `
  <div class="fade-up" style="animation-delay:0.45s;margin-bottom:16px">
    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:16px">

      <!-- Peer Percentile -->
      <div class="card" style="padding:20px">
        <div class="section-label">👥 Peer Percentile</div>
        <div style="position:relative;margin:16px 0">
          <svg viewBox="0 0 200 100" width="100%">
            <!-- Normal distribution curve -->
            <path d="M 10 90 Q 50 90 80 60 Q 100 40 120 20 Q 140 5 160 20 Q 180 40 190 90" fill="${color}" fill-opacity="0.1" stroke="${color}" stroke-width="2"/>
            <!-- Shade up to percentile -->
            <clipPath id="pctClip">
              <rect x="0" y="0" width="${10 + (pct/100) * 180}" height="100"/>
            </clipPath>
            <path d="M 10 90 Q 50 90 80 60 Q 100 40 120 20 Q 140 5 160 20 Q 180 40 190 90" fill="${color}" fill-opacity="0.3" clip-path="url(#pctClip)"/>
            <!-- Marker line -->
            <line x1="${10 + (pct/100) * 180}" y1="10" x2="${10 + (pct/100) * 180}" y2="90" stroke="${color}" stroke-width="2" stroke-dasharray="4,2"/>
            <text x="100" y="75" text-anchor="middle" font-size="22" font-weight="800" font-family="Inter Display,sans-serif" fill="${color}">${pct}th</text>
            <text x="100" y="88" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="Inter,sans-serif">percentile in cohort</text>
          </svg>
        </div>
        <div style="font-size:12px;color:var(--text2);text-align:center;line-height:1.5">
          You're scoring better than <strong style="color:${color}">${pct}%</strong> of students on this platform.
        </div>
      </div>

      <!-- College Probability Ladder -->
      <div class="card" style="padding:20px">
        <div class="section-label">🏫 College Admission Probability</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${d.colleges.map(c => `
            <div style="display:flex;align-items:center;gap:10px">
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
                <div style="font-size:10px;color:var(--text3)">Cutoff: ${c.type === 'percentile' ? c.cutoff+'%ile' : c.cutoff+' marks'}</div>
              </div>
              <div style="width:100px">
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${c.prob}%;background:${c.prob >= 70 ? '#10b981' : c.prob >= 40 ? '#f59e0b' : '#ef4444'}"></div>
                </div>
              </div>
              <div style="width:36px;text-align:right;font-size:12px;font-weight:700;color:${c.prob >= 70 ? '#10b981' : c.prob >= 40 ? '#f59e0b' : '#ef4444'}">${c.prob}%</div>
            </div>
          `).join('')}
        </div>
      </div>

    </div>
  </div>`;
}

function RankCard() {
  if (!state.showRankCard) return '';
  const ex = state.exam;
  const d = DATA[ex];
  const color = getExamColor(ex);
  const latest = d.mocks[d.mocks.length - 1];
  const air = d.airData;
  const today = new Date().toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});

  return `
  <div class="modal-overlay" onclick="if(event.target===this)setState({showRankCard:false})">
    <div style="max-width:380px;width:90%">
      <!-- The shareable card -->
      <div id="rankCardContent" style="border-radius:20px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.3)">
        <div class="rank-card-gradient" style="padding:32px;text-align:center;position:relative">
          <div style="position:absolute;top:0;left:0;right:0;bottom:0;opacity:0.05;background-image:repeating-linear-gradient(45deg,white 0,white 1px,transparent 0,transparent 50%);background-size:20px 20px"></div>
          <div style="position:relative">
            <div style="font-size:11px;font-weight:700;letter-spacing:0.12em;color:rgba(255,255,255,0.7);margin-bottom:4px">keySkillset · ${getExamLabel(ex)}</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.9);margin-bottom:16px">${DATA.student.name}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:4px">Predicted ${ex === 'jee' ? 'Percentile' : 'All India Rank'}</div>
            <div style="font-family:'Inter Display',sans-serif;font-size:56px;font-weight:800;color:white;line-height:1;margin-bottom:4px">
              ${ex === 'jee' ? latest.percentile+'%ile' : formatAIR(air.projected)}
            </div>
            <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:24px">
              Mock avg: ${latest.score}/${getExamMax(ex)} · ${d.mocks.length} tests taken
            </div>
            <div style="display:flex;justify-content:center;gap:24px">
              <div>
                <div style="font-size:18px;font-weight:700;color:white">${d.mocks[d.mocks.length-1].score - d.mocks[0].score > 0 ? '+' : ''}${d.mocks[d.mocks.length-1].score - d.mocks[0].score}</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.6)">marks improved</div>
              </div>
              <div>
                <div style="font-size:18px;font-weight:700;color:white">${d.peerPercentile}th</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.6)">peer percentile</div>
              </div>
              <div>
                <div style="font-size:18px;font-weight:700;color:white">${air.confidence}%</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.6)">confidence</div>
              </div>
            </div>
            <div style="margin-top:20px;font-size:10px;color:rgba(255,255,255,0.5)">${today} · keyskillset.com</div>
          </div>
        </div>
      </div>
      <!-- Actions -->
      <div style="display:flex;gap:12px;margin-top:16px">
        <button class="primary-btn" style="flex:1" onclick="setState({showRankCard:false})">
          📱 Share on WhatsApp
        </button>
        <button class="ghost-btn" onclick="setState({showRankCard:false})">Close</button>
      </div>
    </div>
  </div>`;
}

function OnboardingModal() {
  if (state.onboarded) return '';
  const step = state.onboardStep;
  const color = '#4f6ef7';

  const steps = [
    // Step 0: Exam selection
    `<div>
      <div style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px">Welcome to keySkillset Analytics</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:24px">Let's set up your dashboard in 3 quick steps.</div>
      <div class="section-label">Which exam are you preparing for?</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
        ${[['neet','NEET UG','720 marks · 180 questions · 3 sections'],
           ['jee','JEE Mains','300 marks · 90 questions · 3 sections'],
           ['clat','CLAT UG','120 marks · 150 questions · 5 sections']].map(([v,l,sub]) => `
          <div class="onboard-option ${state.onboardExam===v?'selected':''}" onclick="setState({onboardExam:'${v}'})">
            <div style="font-size:14px;font-weight:600">${l}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:1px">${sub}</div>
          </div>
        `).join('')}
      </div>
    </div>`,

    // Step 1: Attempt number
    `<div>
      <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px">Which attempt is this?</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:24px">This helps us personalise your analytics and benchmarks.</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
        ${[['1','1st Attempt','First time appearing for this exam'],
           ['2','Repeater — 2nd Attempt','Appeared once, taking it again'],
           ['3+','Long-term Repeater — 3rd+','Multiple attempts, highly experienced']].map(([v,l,sub]) => `
          <div class="onboard-option ${state.onboardAttempt===v?'selected':''}" onclick="setState({onboardAttempt:'${v}'})">
            <div style="font-size:14px;font-weight:600">${l}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:1px">${sub}</div>
          </div>
        `).join('')}
      </div>
    </div>`,

    // Step 2: Target
    `<div>
      <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px">Set your north star 🎯</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:24px">This is what every metric on your dashboard will be measured against.</div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px">Target Score (out of ${getExamMax(state.onboardExam)})</label>
        <input type="number" id="targetInput" value="${state.onboardTarget || ''}" placeholder="e.g. ${state.onboardExam==='neet'?650:state.onboardExam==='jee'?250:105}"
          min="0" max="${getExamMax(state.onboardExam)}"
          onchange="setState({onboardTarget:this.value})"
          style="width:100%;padding:10px 14px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;font-family:inherit;outline:none"/>
      </div>
      <div style="margin-bottom:24px">
        <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px">Previous Real Exam Score (optional — unlocks Recovery Journey)</label>
        <input type="number" id="prevScoreInput" value="${state.onboardPrevScore || ''}" placeholder="Leave blank if 1st attempt"
          min="0" max="${getExamMax(state.onboardExam)}"
          onchange="setState({onboardPrevScore:this.value})"
          style="width:100%;padding:10px 14px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none"/>
      </div>
    </div>`,
  ];

  return `
  <div class="modal-overlay">
    <div class="modal-card">
      <!-- Progress dots -->
      <div style="display:flex;gap:6px;margin-bottom:24px">
        ${[0,1,2].map(i => `<div style="height:4px;border-radius:99px;flex:1;background:${i<=step?color:'var(--border)'}"></div>`).join('')}
      </div>

      ${steps[step]}

      <div style="display:flex;justify-content:space-between;align-items:center">
        ${step > 0
          ? `<button class="ghost-btn" onclick="setState({onboardStep:${step-1}})">← Back</button>`
          : `<div></div>`}
        <button class="primary-btn" onclick="${
          step < 2
            ? `setState({onboardStep:${step+1}})`
            : `setState({onboarded:true,exam:state.onboardExam})`
        }">
          ${step < 2 ? 'Continue →' : 'View My Analytics 🚀'}
        </button>
      </div>
    </div>
  </div>`;
}

// ─── RENDER ────────────────────────────────────────────────────────────────

function render() {
  const root = document.getElementById('root');
  root.innerHTML = `
    ${OnboardingModal()}
    ${RankCard()}
    ${Navbar()}
    <div style="max-width:1200px;margin:0 auto;padding:24px 24px 64px">

      ${HeroSection()}
      ${RecoveryJourney()}
      ${ScoreTrajectory()}
      ${MistakeIntelligence()}
      ${ConceptMastery()}
      ${SectionPerformance()}
      ${ExamSpecificInsights()}
      ${LeverageActions()}
      ${PeerComparison()}

      <!-- Share Rank Card CTA -->
      <div class="card fade-up" style="text-align:center;padding:28px;background:linear-gradient(135deg,${getExamColor(state.exam)}10,transparent);border:1px dashed ${getExamColor(state.exam)}40">
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">Share Your Progress 📤</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Generate a rank card with your predicted AIR and share with friends or family.</div>
        <button class="primary-btn" onclick="setState({showRankCard:true})" style="background:${getExamColor(state.exam)}">
          Generate Rank Card
        </button>
      </div>

    </div>`;
}

// Init
window.setState = setState;
render();
</script>
</body>
</html>
